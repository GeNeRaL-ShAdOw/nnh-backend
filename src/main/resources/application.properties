# ─── Application ───────────────────────────────────────────────────────────────
spring.application.name=nnh-backend
server.port=8080

# ─── H2 File-backed Database (Development) ─────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/nnh-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── PostgreSQL (Production) – uncomment and fill in to switch ─────────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/nnh_db
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=nnh_user
# spring.datasource.password=changeme

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Base64-encoded secret (≥256 bits for HS256). Change before going to production.
app.jwt.secret=bm5oU2VjdXJlSldUU2VjcmV0S2V5Rm9yTmFuZGFOdXJzaW5nSG9tZTIwMjU=
app.jwt.expiration-ms=86400000

# ─── CORS allowed origins ──────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

# ─── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtpout.secureserver.net
spring.mail.port=465
spring.mail.username=care@nandanursinghome.in
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=care@nandanursinghome.in
app.mail.cc=drvaishnavipurohit@nandanursinghome.in
app.mail.enabled=false

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.nnh=INFO
logging.level.org.hibernate.SQL=WARN
# Silence the WARN Spring MVC emits when resolving NoResourceFoundException
# (e.g. browser favicon.ico requests hitting a pure API server)
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
