# ─── Production Database (Railway PostgreSQL) ───────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ─── Disable H2 console in prod ─────────────────────────────────────────────
spring.h2.console.enabled=false

# ─── Mail ────────────────────────────────────────────────────────────────────
spring.mail.host=smtpout.secureserver.net
spring.mail.port=465
spring.mail.username=care@nandanursinghome.in
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=care@nandanursinghome.in
app.mail.cc=drvaishnavipurohit@nandanursinghome.in
app.mail.enabled=true

# ─── JWT secret from env (set in Railway dashboard) ─────────────────────────
app.jwt.secret=${JWT_SECRET}

# ─── CORS: your Netlify/GoDaddy domain ──────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
